<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Login - TripAdvisor</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: radial-gradient(circle at top left, #0f172a, #020617);
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      width: 360px;
      background: rgba(30, 41, 59, 0.85);
      border: 1px solid rgba(51, 65, 85, 0.5);
      border-radius: 16px;
      padding: 40px 35px;
      box-shadow: 0 4px 25px rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(10px);
    }

    h1 {
      text-align: center;
      color: #60a5fa;
      margin-bottom: 25px;
      font-weight: 600;
      font-size: 26px;
    }

    label {
      display: block;
      margin-top: 14px;
      color: #cbd5e1;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #f8fafc;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus {
      border: 1px solid #60a5fa;
    }

    button {
      width: 100%;
      background: linear-gradient(90deg, #2563eb, #1d4ed8);
      color: white;
      font-weight: 600;
      border: none;
      padding: 12px;
      border-radius: 8px;
      margin-top: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: linear-gradient(90deg, #1d4ed8, #2563eb);
      transform: scale(1.02);
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    .footer a {
      color: #60a5fa;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Agent Login</h1>
    <form id="loginForm">
      <label>Email</label>
      <input type="email" name="email" required />

      <label>Password</label>
      <input type="password" name="password" required />

      <button type="submit">Login</button>
    </form>
    <div class="footer">
      New agent? <a href="/agent/signup">Register here</a>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target).entries());
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
      const result = await res.json();
      if (result.ok && result.user.role === "agent") {
        alert("✅ Login successful! Redirecting...");
        window.location.href = "/agent/trips/new";
      } else {
        alert("⚠️ " + (result.error || "Invalid credentials or not an agent account."));
      }
    });
  </script>
</body>
</html>
