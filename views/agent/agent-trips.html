<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TripAdvisor Agent | My Trips</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #020617;
      --bg-elevated: #020617;
      --card: #020617;
      --card-soft: #020617;
      --nav: #020617;
      --border-subtle: #1e293b;
      --accent: #2563eb;
      --accent-soft: #1d4ed8;
      --text-main: #e5e7eb;
      --text-soft: #94a3b8;
      --danger: #f97373;
      --success: #22c55e;
      --warning: #facc15;
      --radius-xl: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Poppins", sans-serif;
    }

    body {
      background: radial-gradient(circle at top left, #0b1120, #020617 55%);
      min-height: 100vh;
      color: var(--text-main);
    }

    .tw-agent-shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 20px 32px;
    }

    /* ------- Top nav (same as bookings) ------- */
    .tw-agent-nav {
      height: 60px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      margin-bottom: 28px;
      backdrop-filter: blur(20px);
    }

    .tw-nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tw-logo-circle {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9fafb;
      color: #020617;
      font-weight: 700;
    }
    .tw-logo-text {
      font-weight: 600;
      font-size: 18px;
    }

    .tw-nav-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .tw-nav-link {
      border-radius: 999px;
      padding: 8px 14px;
      border: none;
      background: transparent;
      color: var(--text-soft);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .tw-nav-link:hover {
      color: var(--text-main);
      background: rgba(30, 64, 175, 0.25);
    }
    .tw-nav-link.tw-active {
      background: var(--accent);
      color: #f9fafb;
      font-weight: 500;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.5),
        0 12px 30px rgba(37, 99, 235, 0.4);
    }

    /* ------- Page hero ------- */
    .tw-hero {
      margin-top: 10px;
      margin-bottom: 22px;
    }
    .tw-hero-title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .tw-hero-sub {
      font-size: 14px;
      color: var(--text-soft);
    }

    /* ------- Trips card ------- */
    .tw-card {
      background: radial-gradient(circle at top left, #111827, #020617 60%);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-subtle);
      padding: 18px 20px 16px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.7);
    }

    .tw-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .tw-card-header-left h2 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 2px;
    }
    .tw-card-header-left p {
      font-size: 12px;
      color: var(--text-soft);
    }

    .tw-card-header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tw-badge-count {
      font-size: 13px;
      color: var(--text-soft);
    }

    .tw-btn-ghost {
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: transparent;
      color: var(--text-main);
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s;
    }
    .tw-btn-ghost:hover {
      background: rgba(15, 23, 42, 0.8);
      border-color: rgba(148, 163, 184, 0.7);
    }

    /* ------- Table ------- */
    .tw-table-wrap {
      margin-top: 8px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.35);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 750px;
    }

    thead {
      background: rgba(15, 23, 42, 0.98);
    }

    th,
    td {
      padding: 10px 12px;
      text-align: left;
      white-space: nowrap;
      vertical-align: middle;
    }

    th {
      font-weight: 500;
      color: var(--text-soft);
      border-bottom: 1px solid rgba(148, 163, 184, 0.35);
    }

    tbody tr:nth-child(even) {
      background: rgba(15, 23, 42, 0.88);
    }
    tbody tr:nth-child(odd) {
      background: rgba(15, 23, 42, 0.96);
    }

    tbody tr:hover {
      background: rgba(30, 64, 175, 0.35);
    }

    .tw-text-soft {
      color: var(--text-soft);
      font-size: 12px;
    }

    .tw-badge {
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      display: inline-block;
    }
    .tw-badge-active {
      background: rgba(22, 163, 74, 0.18);
      color: #4ade80;
    }
    .tw-badge-hidden {
      background: rgba(148, 163, 184, 0.22);
      color: #e5e7eb;
    }

    .tw-badge-rating {
      background: rgba(234,179,8,0.16);
      color: #facc15;
    }

    .tw-empty {
      text-align: center;
      padding: 22px 12px;
      font-size: 14px;
      color: var(--text-soft);
    }

    /* action buttons per row */
    .tw-actions {
      display: inline-flex;
      gap: 6px;
    }
    .tw-chip-btn {
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: transparent;
      color: var(--text-main);
      padding: 4px 9px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .tw-chip-btn:hover {
      background: rgba(15, 23, 42, 0.9);
      border-color: rgba(148, 163, 184, 0.75);
    }

    .tw-chip-danger {
      border-color: rgba(239,68,68,0.7);
      color: #fecaca;
    }
    .tw-chip-danger:hover {
      background: rgba(239,68,68,0.16);
    }

    .tw-footer {
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-soft);
      text-align: right;
    }

    /* small screens */
    @media (max-width: 768px) {
      .tw-agent-shell {
        padding: 10px 12px 28px;
      }
      .tw-agent-nav {
        border-radius: 14px;
        padding: 0 10px;
      }
      .tw-logo-text {
        display: none;
      }
      .tw-hero-title {
        font-size: 22px;
      }
      .tw-table-wrap {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <div class="tw-agent-shell">
    <!-- Top navigation (consistent with Bookings / Dashboard) -->
    <header class="tw-agent-nav">
      <div class="tw-nav-left">
        <div class="tw-logo-circle">T</div>
        <div class="tw-logo-text">TripAdvisor</div>
      </div>
      <nav class="tw-nav-right">
        <button class="tw-nav-link" onclick="window.location.href='/agent/dashboard'">
          Dashboard
        </button>
        <button class="tw-nav-link tw-active">
          My Trips
        </button>
        <button class="tw-nav-link" onclick="window.location.href='/agent/trips/new'">
          Add Trip
        </button>
        <button class="tw-nav-link" onclick="window.location.href='/agent/bookings'">
          Bookings
        </button>
        <button class="tw-nav-link" onclick="window.location.href='/agent/profile'">
          Profile
        </button>
        <button class="tw-nav-link" id="tw-logout-btn">
          Logout
        </button>
      </nav>
    </header>

    <!-- Page header -->
    <section class="tw-hero">
      <div class="tw-hero-title">My trips</div>
      <div class="tw-hero-sub">
        Manage all trip packages you’ve created — adjust prices, hide outdated routes, or duplicate best-performers.
      </div>
    </section>

    <!-- Trips table -->
    <section class="tw-card">
      <div class="tw-card-header">
        <div class="tw-card-header-left">
          <h2>All trips</h2>
          <p>Only you can see this view. Customers see a curated version on the main TripAdvisor dashboard.</p>
        </div>
        <div class="tw-card-header-right">
          <div class="tw-badge-count">
            <span id="tw-trip-count">0</span> trips
          </div>
          <button class="tw-btn-ghost" onclick="window.location.href='/agent/trips/new'">
            + Add new trip
          </button>
        </div>
      </div>

      <div class="tw-table-wrap" id="tw-table-wrap">
        <!-- table injected by JS -->
      </div>
    </section>

    <div class="tw-footer">
      TripAdvisor Agent · Trip management
    </div>
  </div>

  <script>
    // ---- helper formatters ----
    function rupee(value) {
      const n = Number(value) || 0;
      return new Intl.NumberFormat("en-IN", {
        style: "currency",
        currency: "INR",
        maximumFractionDigits: 0,
      }).format(n);
    }

    function formatDate(d) {
      if (!d) return "-";
      const dt = new Date(d);
      if (isNaN(dt)) return "-";
      return dt.toLocaleDateString("en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric",
      });
    }

    function statusBadge(hidden) {
      if (hidden) {
        return '<span class="tw-badge tw-badge-hidden">Hidden</span>';
      }
      return '<span class="tw-badge tw-badge-active">Active</span>';
    }

    function ratingBadge(rating) {
      if (rating == null || isNaN(Number(rating))) {
        return '<span class="tw-text-soft">—</span>';
      }
      const r = Number(rating).toFixed(1);
      return '<span class="tw-badge tw-badge-rating">' + r + ' ★</span>';
    }

    // ---- auth check (agent only) ----
    async function ensureAgent() {
      try {
        const res = await fetch("/api/auth/me");
        if (!res.ok) {
          window.location.href = "/agent/login";
          return false;
        }
        const data = await res.json();
        if (!data.ok || !data.user || data.user.role !== "agent") {
          window.location.href = "/agent/login";
          return false;
        }
        return true;
      } catch (err) {
        console.error(err);
        window.location.href = "/agent/login";
        return false;
      }
    }

    // ---- fetch trips for this agent ----
    async function loadTrips() {
      const wrap = document.getElementById("tw-table-wrap");
      const countEl = document.getElementById("tw-trip-count");

      wrap.innerHTML = '<div class="tw-empty">Loading trips...</div>';

      try {
        const res = await fetch("/api/agent/trips/my");
        const data = await res.json();

        if (!res.ok || !data.ok) {
          wrap.innerHTML = '<div class="tw-empty">Could not load trips.</div>';
          return;
        }

        const trips = data.trips || [];
        countEl.textContent = trips.length;

        if (!trips.length) {
          wrap.innerHTML =
            '<div class="tw-empty">You haven’t created any trips yet. Click “Add new trip” to publish your first package.</div>';
          return;
        }

        const htmlRows = trips
          .map((t) => {
            const route =
              (t.src || "—") + " → " + (t.dst || "—");
            const duration = t.durationDays ? t.durationDays + " days" : "—";
            const price = t.pricePerPersonPerDay
              ? rupee(t.pricePerPersonPerDay) + " / day"
              : "—";
            const created = formatDate(t.createdAt || t._id && new Date(parseInt(t._id.substring(0,8),16)*1000));

            const hidden = Boolean(t.hidden || t.isHidden);

            return `
              <tr data-id="${t._id || ""}" data-hidden="${hidden}">
                <td>
                  ${t.title || "Untitled trip"}
                  <div class="tw-text-soft">${route}</div>
                </td>
                <td>${duration}</td>
                <td>${price}</td>
                <td>${ratingBadge(t.rating)}</td>
                <td>${statusBadge(hidden)}</td>
                <td>${created}</td>
                <td>
                  <div class="tw-actions">
                    <button class="tw-chip-btn" data-action="edit">Edit</button>
                    <button class="tw-chip-btn" data-action="toggle">
                      ${hidden ? "Unhide" : "Hide"}
                    </button>
                    <button class="tw-chip-btn" data-action="duplicate">Duplicate</button>
                    <!-- NEW: delete button -->
                    <button class="tw-chip-btn tw-chip-danger" data-action="delete">Delete</button>
                  </div>
                </td>
              </tr>
            `;
          })
          .join("");

        wrap.innerHTML = `
          <div style="overflow-x:auto;">
            <table>
              <thead>
                <tr>
                  <th>Trip</th>
                  <th>Duration</th>
                  <th>Price / person</th>
                  <th>Rating</th>
                  <th>Status</th>
                  <th>Created</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                ${htmlRows}
              </tbody>
            </table>
          </div>
        `;

        attachRowHandlers();
      } catch (err) {
        console.error(err);
        wrap.innerHTML =
          '<div class="tw-empty">Unexpected error loading trips.</div>';
      }
    }

    // ---- row actions (Edit / Hide / Duplicate / Delete) ----
    function attachRowHandlers() {
      const rows = document.querySelectorAll("tbody tr[data-id]");
      rows.forEach((row) => {
        const id = row.getAttribute("data-id");
        const hidden = row.getAttribute("data-hidden") === "true";

        row.querySelectorAll(".tw-chip-btn").forEach((btn) => {
          const action = btn.getAttribute("data-action");
          if (!action) return;

          btn.addEventListener("click", async (e) => {
            e.stopPropagation();

            if (action === "edit") {
              window.location.href = `/agent/trips/new?edit=${encodeURIComponent(
                id
              )}`;
            }

            if (action === "toggle") {
              const makeHidden = !hidden;
              if (
                !confirm(
                  makeHidden
                    ? "Hide this trip from customers?"
                    : "Make this trip visible to customers again?"
                )
              ) {
                return;
              }

              try {
                const res = await fetch(`/api/agent/trips/${id}/visibility`, {
                  method: "PATCH",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ hidden: makeHidden }),
                });
                const data = await res.json();
                if (!res.ok || !data.ok) {
                  alert(data.error || "Failed to update visibility");
                  return;
                }
                await loadTrips();
              } catch (err) {
                console.error(err);
                alert("Error updating trip visibility");
              }
            }

            if (action === "duplicate") {
              if (
                !confirm(
                  "Duplicate this trip? You can edit the copy afterwards."
                )
              ) {
                return;
              }
              try {
                const res = await fetch(
                  `/api/agent/trips/${id}/duplicate`,
                  { method: "POST" }
                );
                const data = await res.json();
                if (!res.ok || !data.ok) {
                  alert(data.error || "Failed to duplicate trip");
                  return;
                }
                await loadTrips();
              } catch (err) {
                console.error(err);
                alert("Error duplicating trip");
              }
            }

            // NEW: hard delete
            if (action === "delete") {
              if (!confirm("Permanently delete this trip? This cannot be undone.")) {
                return;
              }
              try {
                const res = await fetch(`/api/agent/trips/${id}`, {
                  method: "DELETE",
                });
                const data = await res.json();
                if (!res.ok || !data.ok) {
                  alert(data.error || "Failed to delete trip");
                  return;
                }
                await loadTrips();
              } catch (err) {
                console.error(err);
                alert("Error deleting trip");
              }
            }
          });
        });
      });
    }

    // ---- logout ----
    document.addEventListener("DOMContentLoaded", () => {
      const logoutBtn = document.getElementById("tw-logout-btn");
      if (logoutBtn) {
        logoutBtn.addEventListener("click", async () => {
          try {
            await fetch("/api/auth/logout", { method: "POST" });
          } catch (_) {}
          window.location.href = "/agent/login";
        });
      }
    });

    // ---- init ----
    (async function init() {
      const ok = await ensureAgent();
      if (!ok) return;
      await loadTrips();
    })();
  </script>
</body>
</html>
