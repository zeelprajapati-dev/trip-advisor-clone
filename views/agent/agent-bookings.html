<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TripAdvisore Agent | Bookings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #020617;
      --bg-elevated: #020617;
      --card: #020617;
      --card-soft: #020617;
      --nav: #020617;
      --border-subtle: #1e293b;
      --accent: #2563eb;
      --accent-soft: #1d4ed8;
      --text-main: #e5e7eb;
      --text-soft: #94a3b8;
      --danger: #f97373;
      --success: #22c55e;
      --warning: #facc15;
      --radius-xl: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Poppins", sans-serif;
    }

    body {
      background: radial-gradient(circle at top left, #0b1120, #020617 55%);
      min-height: 100vh;
      color: var(--text-main);
    }

    /* Top nav like main app + add-trip page */
    .tw-agent-shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 20px 32px;
    }

    .tw-agent-nav {
      height: 60px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      margin-bottom: 28px;
      backdrop-filter: blur(20px);
    }

    .tw-nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tw-logo-circle {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9fafb;
      color: #020617;
      font-weight: 700;
    }
    .tw-logo-text {
      font-weight: 600;
      font-size: 18px;
    }

    .tw-nav-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .tw-nav-link {
      border-radius: 999px;
      padding: 8px 14px;
      border: none;
      background: transparent;
      color: var(--text-soft);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .tw-nav-link:hover {
      color: var(--text-main);
      background: rgba(30, 64, 175, 0.25);
    }
    .tw-nav-link.tw-active {
      background: var(--accent);
      color: #f9fafb;
      font-weight: 500;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.5),
        0 12px 30px rgba(37, 99, 235, 0.4);
    }

    /* hero / heading */
    .tw-hero {
      margin-top: 10px;
      margin-bottom: 22px;
    }
    .tw-hero-title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .tw-hero-sub {
      font-size: 14px;
      color: var(--text-soft);
    }

    /* bookings card */
    .tw-card {
      background: radial-gradient(circle at top left, #111827, #020617 60%);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-subtle);
      padding: 18px 20px 16px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.7);
    }

    .tw-card-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .tw-card-header h2 {
      font-size: 18px;
      font-weight: 500;
    }
    .tw-badge-count {
      font-size: 13px;
      color: var(--text-soft);
    }

    /* --- filter bar (new) --- */
    .tw-filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 4px 0 12px;
      align-items: center;
    }
    .tw-filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 140px;
      flex: 1 1 140px;
    }
    .tw-filter-label {
      font-size: 11px;
      color: var(--text-soft);
    }
    .tw-filter-input,
    .tw-filter-select {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(15, 23, 42, 0.92);
      color: var(--text-main);
      font-size: 12px;
      outline: none;
      min-height: 32px;
    }
    .tw-filter-input::placeholder {
      color: rgba(148, 163, 184, 0.9);
    }
    .tw-filter-input:focus,
    .tw-filter-select:focus {
      border-color: rgba(37, 99, 235, 0.9);
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.6);
    }

    .tw-filter-actions {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .tw-filter-reset {
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: transparent;
      color: var(--text-soft);
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      min-height: 32px;
    }
    .tw-filter-reset:hover {
      background: rgba(15, 23, 42, 0.9);
      color: var(--text-main);
      border-color: rgba(148, 163, 184, 0.7);
    }

    .tw-table-wrap {
      margin-top: 8px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.35);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 700px;
    }

    thead {
      background: rgba(15, 23, 42, 0.98);
    }

    th,
    td {
      padding: 10px 12px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      font-weight: 500;
      color: var(--text-soft);
      border-bottom: 1px solid rgba(148, 163, 184, 0.35);
    }

    tbody tr:nth-child(even) {
      background: rgba(15, 23, 42, 0.8);
    }
    tbody tr:nth-child(odd) {
      background: rgba(15, 23, 42, 0.95);
    }

    tbody tr:hover {
      background: rgba(30, 64, 175, 0.35);
    }

    .tw-text-soft {
      color: var(--text-soft);
      font-size: 12px;
    }

    .tw-badge {
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      display: inline-block;
    }
    .tw-badge-success {
      background: rgba(22, 163, 74, 0.18);
      color: #4ade80;
    }
    .tw-badge-danger {
      background: rgba(239, 68, 68, 0.18);
      color: #fecaca;
    }
    .tw-badge-warning {
      background: rgba(234, 179, 8, 0.2);
      color: #facc15;
    }

    .tw-empty {
      text-align: center;
      padding: 22px 12px;
      font-size: 14px;
      color: var(--text-soft);
    }

    .tw-footer {
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-soft);
      text-align: right;
    }

    /* small screens */
    @media (max-width: 768px) {
      .tw-agent-shell {
        padding: 10px 12px 28px;
      }
      .tw-agent-nav {
        border-radius: 14px;
        padding: 0 10px;
      }
      .tw-logo-text {
        display: none;
      }
      .tw-hero-title {
        font-size: 22px;
      }
      .tw-table-wrap {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <div class="tw-agent-shell">
    <!-- Top navigation -->
    <header class="tw-agent-nav">
      <div class="tw-nav-left">
        <div class="tw-logo-circle">T</div>
        <div class="tw-logo-text">TripAdvisor</div>
      </div>
      <nav class="tw-nav-right">
        <button class="tw-nav-link" onclick="window.location.href='/agent/dashboard'">
          Dashboard
        </button>
        <button class="tw-nav-link" onclick="window.location.href='/agent/trips'">
          My Trips
        </button>
        <button class="tw-nav-link" onclick="window.location.href='/agent/trips/new'">
          Add Trip
        </button>
        <button class="tw-nav-link tw-active">
          Bookings
        </button>
        <button class="tw-nav-link" onclick="window.location.href='/agent/profile'">
          Profile
        </button>
        <button class="tw-nav-link" id="tw-logout-btn">
          Logout
        </button>
      </nav>
    </header>

    <!-- Page header -->
    <section class="tw-hero">
      <div class="tw-hero-title">Customer bookings</div>
      <div class="tw-hero-sub">
        See who has booked your trips — passengers, routes, payments and status.
      </div>
    </section>

    <!-- Bookings table -->
    <section class="tw-card">
      <div class="tw-card-header">
        <h2>All bookings</h2>
        <div class="tw-badge-count">
          <span id="tw-booking-count">0</span> records
        </div>
      </div>

      <!-- FILTER BAR (new) -->
      <div class="tw-filter-bar">
        <div class="tw-filter-group" style="flex:2 1 200px;">
          <label class="tw-filter-label" for="tw-filter-search">Search (name / email)</label>
          <input
            id="tw-filter-search"
            class="tw-filter-input"
            type="text"
            placeholder="Type to search customers..."
          />
        </div>

        <div class="tw-filter-group">
          <label class="tw-filter-label" for="tw-filter-payment">Payment status</label>
          <select id="tw-filter-payment" class="tw-filter-select">
            <option value="all">All</option>
            <option value="paid">Paid</option>
            <option value="pending">Pending</option>
            <option value="failed">Failed</option>
          </select>
        </div>

        <div class="tw-filter-group">
          <label class="tw-filter-label" for="tw-filter-booking">Booking status</label>
          <select id="tw-filter-booking" class="tw-filter-select">
            <option value="all">All</option>
            <option value="confirmed">Confirmed</option>
            <option value="cancelled">Cancelled</option>
            <option value="upcoming">Upcoming</option>
            <option value="past">Past</option>
          </select>
        </div>

        <div class="tw-filter-group">
          <label class="tw-filter-label" for="tw-filter-from">Departure from</label>
          <input id="tw-filter-from" class="tw-filter-input" type="date" />
        </div>

        <div class="tw-filter-group">
          <label class="tw-filter-label" for="tw-filter-to">Departure to</label>
          <input id="tw-filter-to" class="tw-filter-input" type="date" />
        </div>

        <div class="tw-filter-actions">
          <button type="button" class="tw-filter-reset" id="tw-filter-reset">
            Reset filters
          </button>
        </div>
      </div>

      <div class="tw-table-wrap" id="tw-table-wrap">
        <!-- table injected by JS -->
      </div>
    </section>

    <div class="tw-footer">
      TripAdvisor Agent · Bookings overview
    </div>
  </div>

  <script>
    // keep all bookings in memory for filtering
    let allBookings = [];

    const wrap = document.getElementById("tw-table-wrap");
    const countEl = document.getElementById("tw-booking-count");

    const searchInput = document.getElementById("tw-filter-search");
    const paymentSelect = document.getElementById("tw-filter-payment");
    const bookingSelect = document.getElementById("tw-filter-booking");
    const fromInput = document.getElementById("tw-filter-from");
    const toInput = document.getElementById("tw-filter-to");
    const resetBtn = document.getElementById("tw-filter-reset");

    // Currency formatter in rupees
    function rupee(value) {
      const n = Number(value) || 0;
      return new Intl.NumberFormat("en-IN", {
        style: "currency",
        currency: "INR",
        maximumFractionDigits: 0,
      }).format(n);
    }

    // Format date
    function formatDate(d) {
      if (!d) return "-";
      const dt = new Date(d);
      if (isNaN(dt)) return "-";
      return dt.toLocaleDateString("en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric",
      });
    }

    function paymentBadge(status) {
      const s = (status || "").toLowerCase();
      if (s === "paid" || s === "success" || s === "confirmed") {
        return '<span class="tw-badge tw-badge-success">Paid</span>';
      }
      if (s === "partial") {
        return '<span class="tw-badge tw-badge-warning">Partial</span>';
      }
      if (!s || s === "pending") {
        return '<span class="tw-badge tw-badge-warning">Pending</span>';
      }
      return '<span class="tw-badge tw-badge-danger">' + status + "</span>";
    }

    function statusBadge(status) {
      const s = (status || "").toLowerCase();
      if (s === "confirmed") {
        return '<span class="tw-badge tw-badge-success">Confirmed</span>';
      }
      if (s === "cancelled") {
        return '<span class="tw-badge tw-badge-danger">Cancelled</span>';
      }
      if (!s || s === "pending") {
        return '<span class="tw-badge tw-badge-warning">Pending</span>';
      }
      return '<span class="tw-badge tw-badge-warning">' + status + "</span>";
    }

    // map raw paymentStatus -> filter category
    function getPaymentCategory(status) {
      const s = (status || "").toLowerCase();
      if (s === "paid" || s === "success" || s === "confirmed") return "paid";
      if (s === "partial" || s === "pending" || !s) return "pending";
      return "failed";
    }

    // derive booking category (for upcoming/past)
    function getBookingCategory(b) {
      const s = (b.status || "").toLowerCase();
      if (s === "confirmed") return "confirmed";
      if (s === "cancelled") return "cancelled";

      // derive upcoming/past using departureDate when not cancelled
      if (!b.departureDate) return "pending";
      const dep = new Date(b.departureDate);
      if (isNaN(dep)) return "pending";

      const today = new Date();
      // normalize times to date only
      today.setHours(0,0,0,0);
      dep.setHours(0,0,0,0);

      if (dep >= today) return "upcoming";
      return "past";
    }

    // Check that the current user is an authenticated agent
    async function ensureAgent() {
      try {
        const res = await fetch("/api/auth/me");
        if (!res.ok) {
          window.location.href = "/agent/login";
          return false;
        }
        const data = await res.json();
        if (!data.ok || data.user.role !== "agent") {
          window.location.href = "/agent/login";
          return false;
        }
        return true;
      } catch (err) {
        console.error(err);
        window.location.href = "/agent/login";
        return false;
      }
    }

    // render single row
    function bookingRowHtml(b) {
      const contact =
        b.phone ||
        b.contactNumber ||
        b.email ||
        "<span class='tw-text-soft'>—</span>";

      const [src, dst] = (b.route || "").split("→").map((s) => s.trim());
      const srcSafe = src || b.src || "-";
      const dstSafe = dst || b.dst || "-";

      return `
        <tr>
          <td>
            ${b.customerName || "Unknown"}
            <div class="tw-text-soft">${b.tripTitle || ""}</div>
          </td>
          <td>${contact}</td>
          <td>${b.passengers || 0}</td>
          <td>${srcSafe}</td>
          <td>${dstSafe}</td>
          <td>${formatDate(b.departureDate)}</td>
          <td>${rupee(b.totalAmount)}</td>
          <td>${paymentBadge(b.paymentStatus)}</td>
          <td>${statusBadge(b.status)}</td>
        </tr>
      `;
    }

    // apply front-end filters
    function renderBookings() {
      if (!wrap) return;

      let filtered = allBookings.slice();

      // search
      const q = (searchInput.value || "").trim().toLowerCase();
      if (q) {
        filtered = filtered.filter((b) => {
          const name = (b.customerName || "").toLowerCase();
          const email = (b.email || "").toLowerCase();
          return name.includes(q) || email.includes(q);
        });
      }

      // payment status
      const payFilter = paymentSelect.value;
      if (payFilter !== "all") {
        filtered = filtered.filter((b) => getPaymentCategory(b.paymentStatus) === payFilter);
      }

      // booking status
      const bookingFilter = bookingSelect.value;
      if (bookingFilter !== "all") {
        filtered = filtered.filter((b) => getBookingCategory(b) === bookingFilter);
      }

      // date range
      const fromVal = fromInput.value;
      const toVal = toInput.value;

      if (fromVal || toVal) {
        const fromDate = fromVal ? new Date(fromVal) : null;
        const toDate = toVal ? new Date(toVal) : null;
        if (fromDate) fromDate.setHours(0,0,0,0);
        if (toDate) toDate.setHours(23,59,59,999);

        filtered = filtered.filter((b) => {
          if (!b.departureDate) return false;
          const dep = new Date(b.departureDate);
          if (isNaN(dep)) return false;
          if (fromDate && dep < fromDate) return false;
          if (toDate && dep > toDate) return false;
          return true;
        });
      }

      countEl.textContent = filtered.length;

      if (!filtered.length) {
        wrap.innerHTML =
          '<div class="tw-empty">No bookings match your filters.</div>';
        return;
      }

      const htmlRows = filtered.map(bookingRowHtml).join("");

      wrap.innerHTML = `
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>Customer</th>
                <th>Contact</th>
                <th>Persons</th>
                <th>Source</th>
                <th>Destination</th>
                <th>Departure</th>
                <th>Total Payment</th>
                <th>Payment</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${htmlRows}
            </tbody>
          </table>
        </div>
      `;
    }

    // load from backend once
    async function loadBookings() {
      wrap.innerHTML =
        '<div class="tw-empty">Loading bookings...</div>';

      try {
        const res = await fetch("/api/agent/trips/customers");
        const data = await res.json();

        if (!res.ok || !data.ok) {
          wrap.innerHTML =
            '<div class="tw-empty">Could not load bookings.</div>';
          return;
        }

        allBookings = data.customers || [];
        if (!allBookings.length) {
          countEl.textContent = 0;
          wrap.innerHTML =
            '<div class="tw-empty">No bookings found yet. Once customers start booking your trips, you will see them here.</div>';
          return;
        }

        // initial render with default filters
        renderBookings();
      } catch (err) {
        console.error(err);
        wrap.innerHTML =
          '<div class="tw-empty">Unexpected error loading bookings.</div>';
      }
    }

    // attach filter event listeners
    function setupFilterListeners() {
      if (searchInput) {
        searchInput.addEventListener("input", () => renderBookings());
      }
      if (paymentSelect) {
        paymentSelect.addEventListener("change", () => renderBookings());
      }
      if (bookingSelect) {
        bookingSelect.addEventListener("change", () => renderBookings());
      }
      if (fromInput) {
        fromInput.addEventListener("change", () => renderBookings());
      }
      if (toInput) {
        toInput.addEventListener("change", () => renderBookings());
      }
      if (resetBtn) {
        resetBtn.addEventListener("click", () => {
          searchInput.value = "";
          paymentSelect.value = "all";
          bookingSelect.value = "all";
          fromInput.value = "";
          toInput.value = "";
          renderBookings();
        });
      }
    }

    // Logout
    document.getElementById("tw-logout-btn").addEventListener("click", async () => {
      try {
        await fetch("/api/auth/logout", { method: "POST" });
      } catch (_) {}
      window.location.href = "/agent/login";
    });

    // Init
    (async function init() {
      const ok = await ensureAgent();
      if (!ok) return;
      setupFilterListeners();
      await loadBookings();
    })();
  </script>
</body>
</html>
