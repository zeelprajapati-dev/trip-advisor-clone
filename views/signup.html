<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Signup | Tripadvisor</title>
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h2>Create Account ✨</h2>
      <p class="subtitle">Join Tripadvisor to explore the world smarter.</p>
      <form id="signupForm">
        <label>Name</label>
        <input type="text" id="name" placeholder="John Doe" required />

        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />

        <label>Password</label>
        <input type="password" id="password" minlength="6" required />

        <label>Confirm Password</label>
        <input type="password" id="confirm" minlength="6" required />

        <button type="submit" class="btn-primary">Sign Up</button>
        <p class="muted">Already have an account? <a href="/login">Login</a></p>
        <p id="error" class="error"></p>
      </form>
    </div>
  </div>

  <script src="/js/signup.js"></script>
</body>
</html>
